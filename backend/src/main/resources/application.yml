server:
  port: ${X_ZOHO_CATALYST_LISTEN_PORT:${PORT:8080}}
  address: 0.0.0.0

spring:
  main:
    lazy-initialization: true
    banner-mode: off
    log-startup-info: false
    allow-bean-definition-overriding: true
    allow-circular-references: true
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true

application:
  name: lifelynk-backend

groq:
  api:
    key: ${GROQ_API_KEY}
